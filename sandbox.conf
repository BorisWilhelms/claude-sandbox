# Claude Sandbox mount configuration
#
# Format: host_path [container_path] [rw]
#
# - Default mode is ro (read-only)
# - Append "rw" for read-write
# - If container_path is omitted, it mirrors the host path under /home/sandbox/
#   e.g. ~/.config/nvim -> /home/sandbox/.config/nvim
# - ~ is expanded to $HOME
# - Lines starting with # are comments
# - Empty lines are ignored

~/.config/git/config
~/.config/nvim
~/.tmux.conf
~/.local/share/nvim rw
~/.claude rw
